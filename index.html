<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matemātika – Uzdevums</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #000;
    --gray: #333;
    --light-gray: #e8e8e8;
    --green: #1a7a3c;
    --green-bg: #edf7f1;
    --red: #b81c1c;
    --red-bg: #fdf0f0;
    --border: #ccc;
  }

  html, body {
    background: #fff;
    color: var(--black);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 20px;
    min-height: 100vh;
  }

  .page {
    max-width: 700px;
    margin: 0 auto;
    padding: 56px 40px 80px;
  }

  /* ── Loading state ── */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
    padding-top: 8px;
  }

  .skeleton {
    background: linear-gradient(90deg, #ebebeb 25%, #f5f5f5 50%, #ebebeb 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 2px;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .sk-title  { width: 55%; height: 26px; }
  .sk-intro  { width: 30%; height: 22px; margin-top: 4px; }
  .sk-task   { width: 75%; height: 22px; margin-top: 32px; }
  .sk-task2  { width: 68%; height: 22px; margin-top: 40px; }

  /* ── Assignment block ── */
  #assignment { display: none; }

  /* Title: "1. uzdevums" bold italic, "(2 punkti)" normal italic — same line */
  .task-header {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1.1rem;
    font-weight: 400;
    font-style: normal;
    line-height: 1.5;
    margin-bottom: 2px;
  }

  .task-header .title-bold {
    font-weight: 700;
    font-style: italic;
  }

  .task-header .title-points {
    font-weight: 400;
    font-style: italic;
  }

  .task-intro {
    font-size: 1rem;
    color: var(--black);
    margin-bottom: 36px;
    font-style: normal;
  }

  /* Each task row: number+points on one line, expression below with big gap */
  .task-row {
    margin-bottom: 40px;
  }

  .task-line {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 0 8px;
  }

  .task-id {
    font-style: normal;
    font-weight: 400;
    font-size: 1rem;
    white-space: nowrap;
  }

  .task-pts {
    font-style: italic;
    font-weight: 400;
    font-size: 1rem;
    white-space: nowrap;
  }

  .task-expr {
    font-size: 1.15rem;
    color: var(--black);
    white-space: nowrap;
    font-style: normal;
  }

  .task-expr sup {
    font-size: 0.68em;
    vertical-align: super;
    line-height: 0;
  }

  .task-expr sub {
    font-size: 0.68em;
    vertical-align: sub;
    line-height: 0;
  }

  .eq-sign {
    font-size: 1.15rem;
    color: var(--black);
    padding: 0 4px;
  }

  .answer-input {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1rem;
    width: 80px;
    border: none;
    border-bottom: 1.5px solid #999;
    outline: none;
    padding: 2px 4px;
    background: transparent;
    color: var(--black);
    text-align: left;
    transition: border-color 0.15s;
  }

  .answer-input:focus { border-bottom-color: var(--black); }
  .answer-input.correct { border-bottom-color: var(--green); color: var(--green); }
  .answer-input.wrong   { border-bottom-color: var(--red);   color: var(--red); }

  /* ── Buttons ── */
  .btn-row {
    margin-top: 36px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.92rem;
    font-weight: 400;
    padding: 8px 22px;
    border: 1.5px solid var(--black);
    background: #fff;
    color: var(--black);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    border-radius: 0;
  }

  .btn:hover { background: var(--black); color: #fff; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn:disabled:hover { background: #fff; color: var(--black); }

  .btn-secondary { border-color: #aaa; color: #555; }
  .btn-secondary:hover { background: var(--light-gray); color: var(--black); border-color: #aaa; }

  /* ── Results ── */
  #results { display: none; margin-top: 32px; }

  .result-item {
    border-left: 3px solid transparent;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: 0.92rem;
    line-height: 1.6;
  }

  .result-item.ok  { border-color: var(--green); background: var(--green-bg); color: var(--green); }
  .result-item.err { border-color: var(--red);   background: var(--red-bg);   color: var(--red); }

  .result-label { font-weight: 600; margin-bottom: 3px; font-size: 0.95rem; }

  .result-explanation { color: #8a0000; font-size: 0.88rem; margin-top: 5px; }

  .spinner {
    display: inline-block;
    width: 13px; height: 13px;
    border: 2px solid #ddd;
    border-top-color: #666;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-left: 7px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error banner ── */
  #error-banner {
    display: none;
    background: #fff3cd;
    border: 1px solid #ffc107;
    color: #7a5600;
    padding: 10px 14px;
    font-size: 0.88rem;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  /* ── Key screen ── */
  #key-screen {
    display: none;
    flex-direction: column;
    gap: 14px;
    padding-top: 8px;
  }

  .key-label { font-size: 0.92rem; color: var(--gray); line-height: 1.5; }

  .key-input {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.9rem;
    border: 1.5px solid var(--border);
    padding: 8px 12px;
    outline: none;
    width: 100%;
    max-width: 460px;
    color: var(--black);
  }

  .key-input:focus { border-color: var(--black); }

  a.btn {
    display: inline-block;
    text-decoration: none;
    text-align: center;
  }

  /* ── Mobile ── */
  @media (max-width: 500px) {
    .page { padding: 32px 20px 60px; }
    .task-expr { font-size: 1.05rem; }
    .answer-input { width: 64px; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Loading skeleton -->
  <div id="loading">
    <div class="skeleton sk-title"></div>
    <div class="skeleton sk-intro"></div>
    <div class="skeleton sk-task"></div>
    <div class="skeleton sk-task2"></div>
  </div>

  <!-- Error banner -->
  <div id="error-banner"></div>

  <!-- Assignment -->
  <div id="assignment">
    <div class="task-header" id="task-title"></div>
    <div class="task-intro" id="task-intro"></div>

    <div id="tasks-container"></div>

    <div class="btn-row">
      <button class="btn" id="check-btn">Pārbaudīt</button>
      <button class="btn btn-secondary" id="new-btn">Jauns variants</button>
    </div>
    <div class="btn-row" style="margin-top:16px;">
      <a href="INDEX_FILE_NAME_HERE" class="btn btn-secondary" id="menu-btn-1">Uz galveno izvēlni</a>
    </div>
  </div>

  <!-- Results -->
  <div id="results">
    <div id="results-container"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="back-btn">Atpakaļ</button>
      <button class="btn btn-secondary" id="new-btn-2">Jauns variants</button>
    </div>
    <div class="btn-row" style="margin-top:16px;">
      <a href="INDEX_FILE_NAME_HERE" class="btn btn-secondary" id="menu-btn-2">Uz galveno izvēlni</a>
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────
//  CONFIGURATION
// ─────────────────────────────────────────────────
const WORKER_URL = "https://floral-tree-d2cb.eusjs56999.workers.dev/";
const GEMINI_MODEL = "gemini-2.0-flash-lite";

// ─────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────
let currentTasks = [];


// ─────────────────────────────────────────────────
//  DOM REFS
// ─────────────────────────────────────────────────
const loadingEl      = document.getElementById("loading");
const errorBanner    = document.getElementById("error-banner");
const assignmentEl   = document.getElementById("assignment");
const taskTitle      = document.getElementById("task-title");
const taskIntro      = document.getElementById("task-intro");
const tasksContainer = document.getElementById("tasks-container");
const checkBtn       = document.getElementById("check-btn");
const newBtn         = document.getElementById("new-btn");
const resultsEl      = document.getElementById("results");
const resultsContainer = document.getElementById("results-container");
const backBtn        = document.getElementById("back-btn");
const newBtn2        = document.getElementById("new-btn-2");



// ─────────────────────────────────────────────────
//  GEMINI API CALL VIA WORKER
// ─────────────────────────────────────────────────
async function callGemini(prompt) {
  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: GEMINI_MODEL,
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.9 }
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error((err.error && err.error.message) || "HTTP " + res.status);
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
}

// ─────────────────────────────────────────────────
//  GENERATE ASSIGNMENT
// ─────────────────────────────────────────────────
const GENERATION_PROMPT = `Tu esi matemātikas skolotājs Latvijā.
Ģenerē vienu skolas uzdevumu ar diviem apakšuzdevumiem, izmantojot TIKAI šādu tematiku:
1.1. Aprēķina pakāpes vērtību (veseli vai daļskaitļu kāpinātāji, piem. 4^(1/2), 27^(1/3), 8^2, 5^0, 2^(-1))
1.2. Aprēķina logaritma vērtību (log ar veselu atbildi, piem. log_2(8), log_5(25), log_3(27))

Atbildi TIKAI ar derīgu JSON bez nekāda markdown, bez papildteksta, bez komentāriem. Tieši šāda struktūra:
{
  "title": "1. uzdevums (2 punkti)",
  "intro": "Aprēķini.",
  "tasks": [
    {
      "id": "1.1.",
      "points": "(1 punkts)",
      "type": "power",
      "expressionHtml": "&#8730;25",
      "answer": "5"
    },
    {
      "id": "1.2.",
      "points": "(1 punkts)",
      "type": "log",
      "expressionHtml": "log<sub>3</sub>81",
      "answer": "4"
    }
  ]
}

Obligātie noteikumi par expressionHtml:
- Kāpinātājs 1/2 → kvadrātsakne: &#8730;x  (piemērs: &#8730;49 nevis 49<sup>1/2</sup>)
- Kāpinātājs 1/3 → kubsakne: &#8731;x  (piemērs: &#8731;27)
- Kāpinātājs 1/4 → ceturtā sakne: <sup>4</sup>&#8730;x  (piemērs: <sup>4</sup>&#8730;16)
- Vesels pozitīvs kāpinātājs: x<sup>n</sup>  (piemērs: 3<sup>4</sup>)
- Negatīvs kāpinātājs: x<sup>-n</sup>  (piemērs: 2<sup>-3</sup>)
- Nulle kāpinātājs: x<sup>0</sup>  (piemērs: 7<sup>0</sup>)
- Logaritms: log<sub>b</sub>x  (piemērs: log<sub>2</sub>32)
- answer ir tikai skaitlis vai vienkārša frakcija (piem. "1/8"), nekāds cits teksts.
- Izvēlies JAUNAS vērtības katru reizi.
- Uzdevumiem jābūt vienkāršiem un viennozīmīgiem.`;

async function fetchNewAssignment() {
  showLoading();
  hideError();
  try {
    const raw = await callGemini(GENERATION_PROMPT);
    const clean = raw.replace(/```json|```/gi, "").trim();
    const data = JSON.parse(clean);
    renderAssignment(data);
  } catch (e) {
    showError("Neizdevās ielādēt uzdevumu: " + e.message + " Mēģini vēlreiz.");
    showAssignmentButtons();
  }
}

// ─────────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────────
function renderAssignment(data) {
  currentTasks = data.tasks;

  // Title: bold italic "1. uzdevums" + italic "(2 punkti)"
  // Expected format: "1. uzdevums (2 punkti)"
  const titleEl = taskTitle;
  const titleText = data.title; // e.g. "1. uzdevums (2 punkti)"
  const parenIdx = titleText.indexOf("(");
  if (parenIdx !== -1) {
    const boldPart = titleText.slice(0, parenIdx).trim();
    const italicPart = titleText.slice(parenIdx);
    titleEl.innerHTML = `<span class="title-bold">${boldPart}</span> <span class="title-points">${italicPart}</span>`;
  } else {
    titleEl.innerHTML = `<span class="title-bold">${titleText}</span>`;
  }

  taskIntro.textContent = data.intro;

  tasksContainer.innerHTML = "";
  data.tasks.forEach(t => {
    const row = document.createElement("div");
    row.className = "task-row";
    row.dataset.id = t.id;

    // Line 1: "1.1. (1 punkts)"
    const topLine = document.createElement("div");
    topLine.className = "task-line";

    const idSpan = document.createElement("span");
    idSpan.className = "task-id";
    idSpan.textContent = t.id;

    const ptsSpan = document.createElement("span");
    ptsSpan.className = "task-pts";
    ptsSpan.textContent = t.points;

    topLine.append(idSpan, ptsSpan);

    // Line 2: expression = input
    const exprLine = document.createElement("div");
    exprLine.className = "task-line";
    exprLine.style.marginTop = "4px";

    const expr = document.createElement("span");
    expr.className = "task-expr";
    expr.innerHTML = t.expressionHtml;

    const eq = document.createElement("span");
    eq.className = "eq-sign";
    eq.textContent = " =";

    const inp = document.createElement("input");
    inp.type = "text";
    inp.className = "answer-input";
    inp.dataset.taskId = t.id;
    inp.setAttribute("inputmode", "decimal");
    inp.setAttribute("autocomplete", "off");
    inp.setAttribute("spellcheck", "false");
    inp.addEventListener("keydown", e => { if (e.key === "Enter") checkBtn.click(); });

    exprLine.append(expr, eq, inp);
    row.append(topLine, exprLine);
    tasksContainer.appendChild(row);
  });

  hideLoading();
  assignmentEl.style.display = "block";
  resultsEl.style.display = "none";
}

// ─────────────────────────────────────────────────
//  CHECK ANSWERS
// ─────────────────────────────────────────────────
checkBtn.addEventListener("click", async () => {
  const inputs = tasksContainer.querySelectorAll(".answer-input");
  let allAnswered = true;
  inputs.forEach(inp => { if (!inp.value.trim()) allAnswered = false; });
  if (!allAnswered) { showError("Lūdzu, atbildi uz visiem uzdevumiem!"); return; }
  hideError();

  checkBtn.disabled = true;
  checkBtn.innerHTML = "Pārbauda<span class='spinner'></span>";
  newBtn.disabled = true;

  const results = [];
  for (const task of currentTasks) {
    const inp = tasksContainer.querySelector(`input[data-task-id="${task.id}"]`);
    const userAns = inp.value.trim();
    const correct = normalize(userAns) === normalize(task.answer);
    inp.classList.remove("correct", "wrong");
    inp.classList.add(correct ? "correct" : "wrong");

    let explanation = "";
    if (!correct) {
      explanation = await fetchExplanation(task, userAns);
    }
    results.push({ task, userAns, correct, explanation });
  }

  renderResults(results);
  checkBtn.disabled = false;
  checkBtn.innerHTML = "Pārbaudīt";
  newBtn.disabled = false;
});

function normalize(val) {
  return val.replace(/\s/g, "").replace(",", ".").toLowerCase();
}

function htmlToText(html) {
  return html
    .replace(/&#8730;/g, "√")
    .replace(/&#8731;/g, "∛")
    .replace(/&#8732;/g, "∜")
    .replace(/<sup>(.*?)<\/sup>/g, "^($1)")
    .replace(/<sub>(.*?)<\/sub>/g, "₍$1₎")
    .replace(/<[^>]+>/g, "")
    .trim();
}

async function fetchExplanation(task, userAns) {
  const typeLabel = task.type === "power" ? "pakāpe" : "logaritms";
  const exprReadable = htmlToText(task.expressionHtml);
  const prompt = `Tu esi matemātikas skolotājs. Skolēns risināja uzdevumu: aprēķina ${typeLabel}.
Izteiksme: ${exprReadable}
Skolēna atbilde: ${userAns}
Pareizā atbilde: ${task.answer}

Uzraksti ĻOTI ĪSKU izskaidrojumu latviski 1 vai 2 teikumos.
Izmanto normālus matemātiskos simbolus: √ ∛ ² ³ ⁴ ⁻¹ ⁻² · ÷ = ½ ⅓ ¼
AIZLIEGTS: zvaigznītes *, restītes #, markdown, treknraksts, saraksti, kods.
Tikai parastais teksts ar matemātiskajiem simboliem. Beidz ar: Pareizā atbilde ir ${task.answer}.`;
  try {
    const text = await callGemini(prompt);
    // strip any markdown that slipped through
    return text
      .replace(/\*\*/g, "").replace(/\*/g, "")
      .replace(/#{1,6}\s/g, "").replace(/`/g, "")
      .replace(/^[-–—]\s*/gm, "").replace(/
+/g, " ")
      .trim();
  } catch {
    return `Pareizā atbilde ir ${task.answer}.`;
  }
}

// ─────────────────────────────────────────────────
//  RENDER RESULTS
// ─────────────────────────────────────────────────
function renderResults(results) {
  resultsContainer.innerHTML = "";
  results.forEach(r => {
    const div = document.createElement("div");
    div.className = "result-item " + (r.correct ? "ok" : "err");

    const label = document.createElement("div");
    label.className = "result-label";
    const exprText = r.task.expressionHtml.replace(/<[^>]+>/g, "");
    label.textContent = r.task.id + " " + exprText + " = " + r.userAns;
    div.appendChild(label);

    if (r.correct) {
      const ok = document.createElement("div");
      ok.textContent = "Pareizi!";
      div.appendChild(ok);
    } else {
      const expl = document.createElement("div");
      expl.className = "result-explanation";
      expl.textContent = r.explanation || `Pareizā atbilde ir ${r.task.answer}.`;
      div.appendChild(expl);
    }

    resultsContainer.appendChild(div);
  });

  assignmentEl.style.display = "none";
  resultsEl.style.display = "block";
}

// ─────────────────────────────────────────────────
//  BACK
// ─────────────────────────────────────────────────
backBtn.addEventListener("click", () => {
  resultsEl.style.display = "none";
  assignmentEl.style.display = "block";
  tasksContainer.querySelectorAll(".answer-input").forEach(inp => {
    inp.classList.remove("correct", "wrong");
  });
});

// ─────────────────────────────────────────────────
//  NEW ASSIGNMENT
// ─────────────────────────────────────────────────
[newBtn, newBtn2].forEach(btn => btn.addEventListener("click", () => {
  assignmentEl.style.display = "none";
  resultsEl.style.display = "none";
  loadingEl.style.display = "flex";
  fetchNewAssignment();
}));

// ─────────────────────────────────────────────────
//  UI HELPERS
// ─────────────────────────────────────────────────
function showLoading() {
  loadingEl.style.display = "flex";
  assignmentEl.style.display = "none";
  resultsEl.style.display = "none";
}

function hideLoading() {
  loadingEl.style.display = "none";
}

function showAssignmentButtons() {
  hideLoading();
  tasksContainer.innerHTML = "";
  taskTitle.textContent = "";
  taskIntro.textContent = "";
  assignmentEl.style.display = "block";
}

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.style.display = "block";
}

function hideError() {
  errorBanner.style.display = "none";
  errorBanner.textContent = "";
}

// ─────────────────────────────────────────────────
//  AUTO-DISCOVER AVAILABLE MODELS
// ─────────────────────────────────────────────────
// ─────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────
(function init() {
  fetchNewAssignment();
})();
</script>
</body>
</html>
