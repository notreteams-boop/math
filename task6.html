<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6. uzdevums – Daļu atņemšana</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #f4d5bb; color: #000; font-family: Arial, Helvetica, sans-serif; font-size: 20px; min-height: 100vh; }
  .page { max-width: 700px; margin: 0 auto; padding: 56px 40px 80px; }

  #status { background: #fff3cd; border: 1px solid #ffc107; color: #7a5600; padding: 10px 14px; font-size: 0.85rem; margin-bottom: 20px; display: none; word-break: break-word; }

  #loading { display: flex; flex-direction: column; gap: 16px; }
  .sk { background: linear-gradient(90deg,#ebebeb 25%,#f5f5f5 50%,#ebebeb 75%); background-size: 200% 100%; animation: sh 1.4s infinite; border-radius: 2px; height: 22px; }
  .sk1{width:55%} .sk2{width:30%} .sk3{width:80%;margin-top:10px} .sk4{width:65%}
  @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  #assignment { display: none; }
  .task-header { font-size: 1.1rem; margin-bottom: 4px; }
  .task-header b { font-weight: 700; font-style: italic; }
  .task-header i { font-style: italic; font-weight: 400; }
  .task-intro { font-size: 1rem; margin-bottom: 28px; }

  .task-row { margin-bottom: 36px; }
  .task-top { font-style: italic; font-size: 1rem; margin-bottom: 6px; }
  .task-expr { font-size: 1.1rem; margin-bottom: 10px; }
  .task-expr sup { font-size: 0.65em; vertical-align: super; line-height: 0; }
  .task-expr sub { font-size: 0.65em; vertical-align: sub; line-height: 0; }

  /* Fraction display */
  .frac { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; font-size: 0.95rem; margin: 0 2px; }
  .frac .num { border-bottom: 1.5px solid #000; padding: 0 3px; text-align: center; }
  .frac .den { padding: 0 3px; text-align: center; }

  .input-line { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .answer-input {
    font-family: Arial, sans-serif; font-size: 1rem;
    width: 200px; border: none; border-bottom: 1.5px solid #999;
    outline: none; padding: 2px 4px; background: transparent;
  }
  .answer-input:focus { border-bottom-color: #000; }
  .answer-input.ok { border-bottom-color: #1a7a3c; color: #1a7a3c; }
  .answer-input.err { border-bottom-color: #b81c1c; color: #b81c1c; }

  .toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
  .toolbar-btn { font-family: Arial, sans-serif; font-size: 0.9rem; padding: 5px 10px; border: 1px solid #999; background: #f4d5bb; cursor: pointer; min-width: 34px; text-align: center; }
  .toolbar-btn:hover { background: #e8c5a5; }

  .hint { font-size: 0.82rem; color: #666; margin-bottom: 6px; font-style: italic; }

  .btn-row { margin-top: 32px; display: flex; gap: 12px; flex-wrap: wrap; }
  .btn { font-family: Arial, sans-serif; font-size: 0.92rem; padding: 8px 22px; border: 1.5px solid #000; background: #fff; color: #000; cursor: pointer; text-decoration: none; display: inline-block; }
  .btn:hover { background: #000; color: #fff; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-sec { border-color: #aaa; color: #555; }
  .btn-sec:hover { background: #eee; color: #000; border-color: #aaa; }
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid #ddd; border-top-color: #666; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-left: 7px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #results { display: none; margin-top: 32px; }
  .score-line { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
  .res-item { border-left: 3px solid transparent; padding: 10px 14px; margin-bottom: 14px; font-size: 0.92rem; line-height: 1.6; }
  .res-item.ok { border-color: #1a7a3c; background: #edf7f1; color: #1a7a3c; }
  .res-item.err { border-color: #b81c1c; background: #fdf0f0; color: #b81c1c; }
  .res-label { font-weight: 600; margin-bottom: 3px; }
  .res-expl { font-size: 0.88rem; margin-top: 5px; color: #8a0000; }

  @media (max-width: 500px) { .page { padding: 32px 20px 60px; } }
</style>
</head>
<body>
<div class="page">
  <div id="status"></div>
  <div id="loading">
    <div class="sk sk1"></div>
    <div class="sk sk2"></div>
    <div class="sk sk3"></div>
    <div class="sk sk4"></div>
  </div>

  <div id="assignment">
    <div class="task-header" id="task-title"></div>
    <div class="task-intro" id="task-intro"></div>

    <div class="task-row">
      <div class="task-expr" id="task-expr"></div>

      <!-- Step 1 -->
      <div class="task-top">6.1. (1 punkts) Nosaka kopsaucēju un paplašina daļas.</div>
      <div class="hint">Pieraksti paplašinātās daļas ar kopsaucēju.</div>
      <div class="input-line">
        <input type="text" class="answer-input" id="input-step1" autocomplete="off" placeholder="piem. (x+5)/(x(x+5))-2/(x(x+5))" />
      </div>
      <div class="toolbar" id="toolbar-step1"></div>

      <!-- Step 2 -->
      <div class="task-top" style="margin-top:24px;">6.2. (1 punkts) Atņem daļas un vienkārso izteiksmi.</div>
      <div class="hint">Galīgā atbilde.</div>
      <div class="input-line">
        <input type="text" class="answer-input" id="input-step2" autocomplete="off" placeholder="piem. (x+3)/(x(x+5))" />
      </div>
      <div class="toolbar" id="toolbar-step2"></div>
    </div>

    <div class="btn-row">
      <button class="btn" id="check-btn">Pārbaudīt</button>
      <button class="btn btn-sec" id="new-btn">Jauns variants</button>
    </div>
    <div class="btn-row" style="margin-top:16px;">
      <a href="index.html" class="btn btn-sec">Uz galveno izvēlni</a>
    </div>
  </div>

  <div id="results">
    <div class="task-header"><b>6. uzdevums</b> – <i>rezultāti</i></div>
    <div class="score-line" id="score-line"></div>
    <div id="results-container"></div>
    <div class="btn-row">
      <button class="btn btn-sec" id="back-btn">Atpakaļ</button>
      <button class="btn btn-sec" id="new-btn-2">Jauns variants</button>
    </div>
    <div class="btn-row" style="margin-top:16px;">
      <a href="index.html" class="btn btn-sec">Uz galveno izvēlni</a>
    </div>
  </div>
</div>

<script>
window.onerror = function(msg, src, line) {
  document.getElementById("loading").style.display = "none";
  document.getElementById("assignment").style.display = "block";
  var s = document.getElementById("status");
  s.textContent = "JS kļūda: " + msg + " (rindiņa " + line + ")";
  s.style.display = "block";
  return true;
};

const WORKER_URL = "https://floral-tree-d2cb.eusjs56999.workers.dev/";
const GEMINI_MODEL = "gemini-2.5-flash";
let currentTask = null;

function showStatus(msg) { var e = document.getElementById("status"); e.textContent = msg; e.style.display = "block"; }
function hideStatus() { document.getElementById("status").style.display = "none"; }

async function callGemini(prompt) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 25000);
  try {
    const res = await fetch(WORKER_URL, {
      method: "POST", signal: controller.signal,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: GEMINI_MODEL, contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.8 } })
    });
    clearTimeout(timer);
    const text = await res.text();
    if (!res.ok) { let m = "HTTP " + res.status; try { m = JSON.parse(text).error.message; } catch(e){} throw new Error(m); }
    const data = JSON.parse(text);
    const r = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text;
    if (!r) throw new Error("Tukša atbilde: " + text.slice(0,150));
    return r;
  } catch(e) { clearTimeout(timer); if (e.name === "AbortError") throw new Error("Timeout."); throw e; }
}

const PROMPT = `Tu esi matemātikas skolotājs Latvijā. Ģenerē uzdevumu "Atņem daļas" ar algebriskām daļām.

Struktūra: a/x - b/(x(x+c)) kur a,b,c ir mazi veseli skaitļi (1-9).
Piemērs: 1/x - 2/(x(x+5))
Kopsaucējs: x(x+c)
1. solis — paplašina: (x+c)/(x(x+c)) - b/(x(x+c))
2. solis — atņem un vienkārso: (x+c-b)/(x(x+c)) = (x+(c-b))/(x(x+c))

Atbildi TIKAI ar derīgu JSON bez markdown:
{
  "expressionHtml": "<sup>1</sup>/<sub>x</sub> – <sup>2</sup>/<sub>x(x+5)</sub>",
  "expressionText": "1/x - 2/(x(x+5))",
  "denominator": "x(x+5)",
  "step1answer": "(x+5)/(x(x+5))-2/(x(x+5))",
  "step1alt": ["(x+5)/(x(x+5)) - 2/(x(x+5))"],
  "step1display": "(x+5)/(x(x+5)) – 2/(x(x+5))",
  "step2answer": "(x+3)/(x(x+5))",
  "step2alt": ["(x+3)/(x*(x+5))"],
  "step2display": "(x+3) / (x(x+5))"
}

Izmanto JAUNAS vērtības. Skaitļi 1-9. Rezultāts step2 nedrīkst būt 0 skaitītājā.`;

function buildToolbar(id) {
  const tb = document.getElementById("toolbar-" + id);
  const inp = document.getElementById("input-" + id);
  tb.innerHTML = "";
  ["x","(",")","+","-","/","·","1","2","3","4","5","6","7","8","9","0"].forEach(function(s) {
    const b = document.createElement("button");
    b.className = "toolbar-btn";
    b.textContent = s;
    b.type = "button";
    b.onclick = function() {
      const start = inp.selectionStart, end = inp.selectionEnd;
      inp.value = inp.value.slice(0, start) + s + inp.value.slice(end);
      inp.focus();
      inp.setSelectionRange(start + s.length, start + s.length);
    };
    tb.appendChild(b);
  });
}

async function fetchNewAssignment() {
  document.getElementById("loading").style.display = "flex";
  document.getElementById("assignment").style.display = "none";
  document.getElementById("results").style.display = "none";
  document.getElementById("input-step1").value = "";
  document.getElementById("input-step2").value = "";
  ["input-step1","input-step2"].forEach(function(id) {
    document.getElementById(id).classList.remove("ok","err");
  });
  hideStatus();
  try {
    const raw = await callGemini(PROMPT);
    const clean = raw.replace(/```json/gi,"").replace(/```/gi,"").trim();
    let data;
    try { data = JSON.parse(clean); } catch(e) { throw new Error("JSON kļūda: " + clean.slice(0,100)); }
    if (!data.step1answer || !data.step2answer) throw new Error("Nepilnīga atbilde.");
    currentTask = data;

    document.getElementById("task-title").innerHTML = "<b>6. uzdevums</b> <i>(2 punkti)</i>";
    document.getElementById("task-intro").textContent = "Atņem daļas.";
    document.getElementById("task-expr").innerHTML = data.expressionHtml + " =";

    buildToolbar("step1");
    buildToolbar("step2");

    document.getElementById("loading").style.display = "none";
    document.getElementById("assignment").style.display = "block";
  } catch(e) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("assignment").style.display = "block";
    showStatus("Kļūda: " + e.message);
  }
}

function norm(v) {
  return v.trim().replace(/\s+/g,"").replace(/·/g,"*").replace(/×/g,"*").toLowerCase();
}

function checkAns(userAns, correct, alts) {
  const u = norm(userAns);
  return [correct].concat(alts||[]).some(function(a){ return norm(a) === u; });
}

document.getElementById("check-btn").addEventListener("click", async function() {
  const v1 = document.getElementById("input-step1").value.trim();
  const v2 = document.getElementById("input-step2").value.trim();
  if (!v1 || !v2) { showStatus("Lūdzu, aizpildi abus soļus!"); return; }
  hideStatus();

  const checkBtn = document.getElementById("check-btn");
  checkBtn.disabled = true;
  checkBtn.innerHTML = "Pārbauda<span class='spinner'></span>";
  document.getElementById("new-btn").disabled = true;

  const ok1 = checkAns(v1, currentTask.step1answer, currentTask.step1alt);
  const ok2 = checkAns(v2, currentTask.step2answer, currentTask.step2alt);

  document.getElementById("input-step1").classList.remove("ok","err");
  document.getElementById("input-step2").classList.remove("ok","err");
  document.getElementById("input-step1").classList.add(ok1 ? "ok" : "err");
  document.getElementById("input-step2").classList.add(ok2 ? "ok" : "err");

  let expl1 = "", expl2 = "";
  if (!ok1 || !ok2) {
    const prompt = "Uzdevums: atņem daļas " + currentTask.expressionText + "\n" +
      "Kopsaucējs: " + currentTask.denominator + "\n" +
      "1. solis (pareizi): " + currentTask.step1display + "\n" +
      "2. solis (pareizi): " + currentTask.step2display + "\n" +
      "Uzraksti 1 īsu teikumu latviski par katru kļūdu. Bez uzrunām. Beidz ar pareizajām atbildēm.";
    try {
      const txt = await callGemini(prompt);
      const clean = txt.replace(/\*\*/g,"").replace(/\*/g,"").replace(/`/g,"").trim();
      if (!ok1) expl1 = "1. solis: " + currentTask.step1display + ".";
      if (!ok2) expl2 = clean.split("\n").slice(-1)[0] || ("2. solis: " + currentTask.step2display + ".");
    } catch(e) {
      expl1 = "Pareizā atbilde: " + currentTask.step1display + ".";
      expl2 = "Pareizā atbilde: " + currentTask.step2display + ".";
    }
  }

  const score = (ok1 ? 1 : 0) + (ok2 ? 1 : 0);
  document.getElementById("score-line").textContent = "Rezultāts: " + score + " / 2";

  const rc = document.getElementById("results-container");
  rc.innerHTML = "";

  [[ok1, "6.1.", v1, currentTask.step1display, expl1],
   [ok2, "6.2.", v2, currentTask.step2display, expl2]].forEach(function(r) {
    const div = document.createElement("div");
    div.className = "res-item " + (r[0] ? "ok" : "err");
    const label = document.createElement("div");
    label.className = "res-label";
    label.textContent = r[1] + " " + r[2];
    div.appendChild(label);
    if (r[0]) {
      const ok = document.createElement("div");
      ok.textContent = "Pareizi!";
      div.appendChild(ok);
    } else {
      const expl = document.createElement("div");
      expl.className = "res-expl";
      expl.textContent = r[4] || "Pareizā atbilde: " + r[3] + ".";
      div.appendChild(expl);
    }
    rc.appendChild(div);
  });

  document.getElementById("assignment").style.display = "none";
  document.getElementById("results").style.display = "block";
  checkBtn.disabled = false;
  checkBtn.innerHTML = "Pārbaudīt";
  document.getElementById("new-btn").disabled = false;
});

document.getElementById("back-btn").addEventListener("click", function() {
  document.getElementById("results").style.display = "none";
  document.getElementById("assignment").style.display = "block";
  ["input-step1","input-step2"].forEach(function(id){ document.getElementById(id).classList.remove("ok","err"); });
});

["input-step1","input-step2"].forEach(function(id) {
  document.getElementById(id).addEventListener("keydown", function(e) {
    if (e.key === "Enter") document.getElementById("check-btn").click();
  });
});

[document.getElementById("new-btn"), document.getElementById("new-btn-2")].forEach(function(btn) {
  btn.addEventListener("click", fetchNewAssignment);
});

fetchNewAssignment();
</script>
</body>
</html>
