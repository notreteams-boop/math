<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4. uzdevums – Sadalīšana reizinātājos</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #f4d5bb; color: #000; font-family: Arial, Helvetica, sans-serif; font-size: 20px; min-height: 100vh; }
  .page { max-width: 700px; margin: 0 auto; padding: 56px 40px 80px; }

  #status { background: #fff3cd; border: 1px solid #ffc107; color: #7a5600; padding: 10px 14px; font-size: 0.85rem; margin-bottom: 20px; display: none; word-break: break-word; }

  #loading { display: flex; flex-direction: column; gap: 16px; }
  .sk { background: linear-gradient(90deg,#ebebeb 25%,#f5f5f5 50%,#ebebeb 75%); background-size: 200% 100%; animation: sh 1.4s infinite; border-radius: 2px; height: 22px; }
  .sk1 { width: 55%; } .sk2 { width: 30%; } .sk3 { width: 75%; margin-top:10px; } .sk4 { width: 65%; }
  @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  #assignment { display: none; }
  .task-header { font-size: 1.1rem; margin-bottom: 4px; }
  .task-header b { font-weight: 700; font-style: italic; }
  .task-header i { font-style: italic; font-weight: 400; }
  .task-intro { font-size: 1rem; margin-bottom: 36px; }
  .task-row { margin-bottom: 40px; }
  .task-top { font-style: italic; font-size: 1rem; margin-bottom: 4px; }
  .task-expr { font-size: 1.15rem; margin-bottom: 10px; }
  .task-expr sup { font-size: 0.65em; vertical-align: super; line-height: 0; }
  .task-expr sub { font-size: 0.65em; vertical-align: sub; line-height: 0; }

  .input-line { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
  .answer-input { font-family: Arial, sans-serif; font-size: 1rem; width: 200px; border: none; border-bottom: 1.5px solid #999; outline: none; padding: 2px 4px; background: transparent; }
  .answer-input:focus { border-bottom-color: #000; }
  .answer-input.ok { border-bottom-color: #1a7a3c; color: #1a7a3c; }
  .answer-input.err { border-bottom-color: #b81c1c; color: #b81c1c; }

  .toolbar { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .toolbar-btn { font-family: Arial, sans-serif; font-size: 0.88rem; padding: 4px 9px; border: 1px solid #999; background: #f4d5bb; cursor: pointer; }
  .toolbar-btn:hover { background: #e8c5a5; }

  .btn-row { margin-top: 32px; display: flex; gap: 12px; flex-wrap: wrap; }
  .btn { font-family: Arial, sans-serif; font-size: 0.92rem; padding: 8px 22px; border: 1.5px solid #000; background: #fff; color: #000; cursor: pointer; text-decoration: none; display: inline-block; }
  .btn:hover { background: #000; color: #fff; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-sec { border-color: #aaa; color: #555; }
  .btn-sec:hover { background: #eee; color: #000; border-color: #aaa; }
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid #ddd; border-top-color: #666; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-left: 7px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #results { display: none; margin-top: 32px; }
  .res-item { border-left: 3px solid transparent; padding: 10px 14px; margin-bottom: 14px; font-size: 0.92rem; line-height: 1.6; }
  .res-item.ok { border-color: #1a7a3c; background: #edf7f1; color: #1a7a3c; }
  .res-item.err { border-color: #b81c1c; background: #fdf0f0; color: #b81c1c; }
  .res-label { font-weight: 600; margin-bottom: 3px; }
  .res-expl { font-size: 0.88rem; margin-top: 5px; color: #8a0000; }

  @media (max-width: 500px) { .page { padding: 32px 20px 60px; } }
</style>
</head>
<body>
<div class="page">
  <div id="status"></div>
  <div id="loading">
    <div class="sk sk1"></div>
    <div class="sk sk2"></div>
    <div class="sk sk3"></div>
    <div class="sk sk4"></div>
  </div>

  <div id="assignment">
    <div class="task-header" id="task-title"></div>
    <div class="task-intro" id="task-intro"></div>
    <div id="tasks-container"></div>
    <div class="btn-row">
      <button class="btn" id="check-btn">Pārbaudīt</button>
      <button class="btn btn-sec" id="new-btn">Jauns variants</button>
    </div>
    <div class="btn-row" style="margin-top:16px;">
      <a href="index.html" class="btn btn-sec">Uz galveno izvēlni</a>
    </div>
  </div>

  <div id="results">
    <div id="results-container"></div>
    <div class="btn-row">
      <button class="btn btn-sec" id="back-btn">Atpakaļ</button>
      <button class="btn btn-sec" id="new-btn-2">Jauns variants</button>
    </div>
    <div class="btn-row" style="margin-top:16px;">
      <a href="index.html" class="btn btn-sec">Uz galveno izvēlni</a>
    </div>
  </div>
</div>

<script>
window.onerror = function(msg, src, line) {
  document.getElementById("loading").style.display = "none";
  document.getElementById("assignment").style.display = "block";
  var s = document.getElementById("status");
  s.textContent = "JS kļūda: " + msg + " (rindiņa " + line + ")";
  s.style.display = "block";
  return true;
};

const WORKER_URL = "https://floral-tree-d2cb.eusjs56999.workers.dev/";
const GEMINI_MODEL = "gemini-2.5-flash";

let currentTasks = [];

function showStatus(msg) { var e = document.getElementById("status"); e.textContent = msg; e.style.display = "block"; }
function hideStatus() { document.getElementById("status").style.display = "none"; }

async function callGemini(prompt) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 25000);
  try {
    const res = await fetch(WORKER_URL, {
      method: "POST", signal: controller.signal,
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: GEMINI_MODEL, contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.8 } })
    });
    clearTimeout(timer);
    const text = await res.text();
    if (!res.ok) { let m = "HTTP " + res.status; try { m = JSON.parse(text).error.message; } catch(e){} throw new Error(m); }
    const data = JSON.parse(text);
    const r = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0] && data.candidates[0].content.parts[0].text;
    if (!r) throw new Error("Tukša atbilde: " + text.slice(0,150));
    return r;
  } catch(e) { clearTimeout(timer); if (e.name === "AbortError") throw new Error("Timeout. Pārbaudi internetu."); throw e; }
}

const PROMPT = `Tu esi matemātikas skolotājs Latvijā. Ģenerē uzdevumu "Sadali reizinātājos" ar 1 apakšuzdevumu.

Izmanto TIKAI šos veidus (izvēlies vienu nejaušu):
- starpības kvadrāts: a² – b² = (a–b)(a+b), piem. x²–9, 4x²–1, 9x²–25
- kubu starpība: a³–b³ = (a–b)(a²+ab+b²), piem. x³–8, x³–27, 8x³–1
- kubu summa: a³+b³ = (a+b)(a²–ab+b²), piem. x³+8, x³+27

Skaitļi mazi: 1,4,8,9,25,27,64. Mainīgais x vai y.

Atbildi TIKAI ar derīgu JSON bez markdown:
{
  "title": "4. uzdevums (1 punkts)",
  "intro": "Sadali reizinātājos.",
  "tasks": [
    {
      "id": "4.1.",
      "points": "(1 punkts)",
      "expressionHtml": "x<sup>3</sup> – 27",
      "answer": "(x-3)(x²+3x+9)",
      "answerAlt": ["(x–3)(x²+3x+9)","(x-3)(x^2+3x+9)","(x–3)(x^2+3x+9)"],
      "answerDisplay": "(x – 3)(x² + 3x + 9)"
    }
  ]
}

Izmanto JAUNAS vērtības. answer un answerAlt — bez atstarpēm, ar parastajām zīmēm. answerDisplay — skaists ar atstarpēm.`;

async function fetchNewAssignment() {
  document.getElementById("loading").style.display = "flex";
  document.getElementById("assignment").style.display = "none";
  document.getElementById("results").style.display = "none";
  hideStatus();
  try {
    const raw = await callGemini(PROMPT);
    const clean = raw.replace(/```json/gi, "").replace(/```/gi, "").trim();
    let data;
    try { data = JSON.parse(clean); } catch(e) { throw new Error("JSON kļūda: " + clean.slice(0,100)); }
    if (!data.tasks || !data.tasks.length) throw new Error("Nav uzdevumu atbildē.");
    renderAssignment(data);
  } catch(e) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("assignment").style.display = "block";
    showStatus("Kļūda: " + e.message);
  }
}

function renderAssignment(data) {
  currentTasks = data.tasks;
  const titleText = data.title;
  const pIdx = titleText.indexOf("(");
  if (pIdx !== -1) {
    document.getElementById("task-title").innerHTML = "<b>" + titleText.slice(0, pIdx).trim() + "</b> <i>" + titleText.slice(pIdx) + "</i>";
  } else {
    document.getElementById("task-title").innerHTML = "<b>" + titleText + "</b>";
  }
  document.getElementById("task-intro").textContent = data.intro;

  const container = document.getElementById("tasks-container");
  container.innerHTML = "";

  data.tasks.forEach(function(t) {
    const row = document.createElement("div");
    row.className = "task-row";

    const top = document.createElement("div");
    top.className = "task-top";
    top.textContent = t.id + " " + t.points;
    row.appendChild(top);

    const expr = document.createElement("div");
    expr.className = "task-expr";
    expr.innerHTML = t.expressionHtml + " =";
    row.appendChild(expr);

    const inputId = "ans-" + t.id;
    const line = document.createElement("div");
    line.className = "input-line";
    const inp = document.createElement("input");
    inp.type = "text";
    inp.className = "answer-input";
    inp.id = inputId;
    inp.dataset.taskId = t.id;
    inp.setAttribute("autocomplete", "off");
    inp.addEventListener("keydown", function(e) { if (e.key === "Enter") document.getElementById("check-btn").click(); });
    line.appendChild(inp);
    row.appendChild(line);

    const tb = document.createElement("div");
    tb.className = "toolbar";
    ["(",")","+","–","·","x","y","²","³","^"].forEach(function(s) {
      const b = document.createElement("button");
      b.className = "toolbar-btn";
      b.textContent = s;
      b.type = "button";
      b.onclick = function() {
        const el = document.getElementById(inputId);
        const start = el.selectionStart, end = el.selectionEnd;
        el.value = el.value.slice(0, start) + s + el.value.slice(end);
        el.focus();
        el.setSelectionRange(start + s.length, start + s.length);
      };
      tb.appendChild(b);
    });
    row.appendChild(tb);

    container.appendChild(row);
  });

  document.getElementById("loading").style.display = "none";
  document.getElementById("assignment").style.display = "block";
}

function normalizeAnswer(v) {
  return v.trim()
    .replace(/\s+/g, "")
    .replace(/–/g, "-")
    .replace(/·/g, "*")
    .replace(/\^2/g, "²")
    .replace(/\^3/g, "³")
    .toLowerCase();
}

document.getElementById("check-btn").addEventListener("click", async function() {
  const inputs = document.querySelectorAll(".answer-input");
  let allFilled = true;
  inputs.forEach(function(inp) { if (!inp.value.trim()) allFilled = false; });
  if (!allFilled) { showStatus("Lūdzu, atbildi uz visiem uzdevumiem!"); return; }
  hideStatus();

  const checkBtn = document.getElementById("check-btn");
  checkBtn.disabled = true;
  checkBtn.innerHTML = "Pārbauda<span class='spinner'></span>";
  document.getElementById("new-btn").disabled = true;

  const results = [];
  for (let i = 0; i < currentTasks.length; i++) {
    const t = currentTasks[i];
    const inp = document.getElementById("ans-" + t.id);
    const userAns = inp.value.trim();
    const allCorrect = [t.answer].concat(t.answerAlt || []);
    const correct = allCorrect.some(function(a) { return normalizeAnswer(userAns) === normalizeAnswer(a); });
    inp.classList.remove("ok", "err");
    inp.classList.add(correct ? "ok" : "err");
    let expl = "";
    if (!correct) expl = await fetchExplanation(t, userAns);
    results.push({ t, userAns, correct, expl });
  }
  renderResults(results);
  checkBtn.disabled = false;
  checkBtn.innerHTML = "Pārbaudīt";
  document.getElementById("new-btn").disabled = false;
});

async function fetchExplanation(task, userAns) {
  const exprClean = task.expressionHtml.replace(/<[^>]+>/g, "");
  const prompt = "Uzdevums: sadali reizinātājos " + exprClean + "\nPareizā atbilde: " + task.answerDisplay + "\nUzraksti 1 īsu teikumu latviski — kāpēc tieši šī atbilde. Bez uzrunām. Beidz ar: Pareizā atbilde: " + task.answerDisplay + ".";
  try {
    const text = await callGemini(prompt);
    return text.replace(/\*\*/g, "").replace(/\*/g, "").replace(/`/g, "").trim();
  } catch(e) {
    return "Pareizā atbilde: " + task.answerDisplay + ".";
  }
}

function renderResults(results) {
  const container = document.getElementById("results-container");
  container.innerHTML = "";
  results.forEach(function(r) {
    const div = document.createElement("div");
    div.className = "res-item " + (r.correct ? "ok" : "err");
    const label = document.createElement("div");
    label.className = "res-label";
    label.textContent = r.t.id + " = " + r.userAns;
    div.appendChild(label);
    if (r.correct) {
      const ok = document.createElement("div");
      ok.textContent = "Pareizi!";
      div.appendChild(ok);
    } else {
      const expl = document.createElement("div");
      expl.className = "res-expl";
      expl.textContent = r.expl || "Pareizā atbilde: " + r.t.answerDisplay + ".";
      div.appendChild(expl);
    }
    container.appendChild(div);
  });
  document.getElementById("assignment").style.display = "none";
  document.getElementById("results").style.display = "block";
}

document.getElementById("back-btn").addEventListener("click", function() {
  document.getElementById("results").style.display = "none";
  document.getElementById("assignment").style.display = "block";
  document.querySelectorAll(".answer-input").forEach(function(inp) { inp.classList.remove("ok", "err"); });
});

[document.getElementById("new-btn"), document.getElementById("new-btn-2")].forEach(function(btn) {
  btn.addEventListener("click", fetchNewAssignment);
});

fetchNewAssignment();
</script>
</body>
</html>
